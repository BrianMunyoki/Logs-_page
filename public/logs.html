<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log list</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <form class="filters">
    <select name="client" id="project">
      <option value="all" selected>Project: All</option>
      <option value="Djoser">Djoser</option>
      <option value="Solundo">Solundo</option>
      <option value="FMTC">FMTC</option>
    </select>

    <input type="date" name="fromDate" aria-label="From date" id="fromTime">
    <input type="date" name="toDate" aria-label="To date" id="toTime">

    <select name="mode">
      <option value="table" selected>Mode: Table</option>
      <option value="chart">Mode: Chart</option>
    </select>
    <button type="button" id="filterButton">Filter</button>
  </form>
 <h2>Totals per activity</h2>

  <table>
    <thead>
      <tr>
        <th >Project</th>
        <th>From Time</th>
        <th>To Time</th>
        <th>Task name</th>
        <th>task id</th>
      </tr>
    </thead>
  <table id="logsTable">
    <thead>
      <tr>
        <th>Startdate</th>
        <th>Stopdate</th>
        <th>Duration</th>
        <th>Client</th>
        <th>Project</th>
        <th>Task</th>
        <th>Log message</th>
      </tr>
    </thead>
  </table>
<script src="index.js"></script>
</body>
</html>
